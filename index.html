
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>test5</title>
</head>
<body class="bg-gray-50 py-12 px-4">
    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
        <h1 id="name" class="text-4xl font-extrabold text-gray-900 mb-2">Loading...</h1>
        <p id="title" class="text-emerald-600 font-medium text-lg mb-6"></p>
        <div class="prose prose-slate">
            <p id="bio" class="text-gray-600 leading-relaxed"></p>
        </div>
        <div id="links" class="mt-8 pt-6 border-t flex gap-4">
            <a id="github" class="bg-black text-white px-4 py-2 rounded-lg text-sm font-semibold">View GitHub</a>
        </div>
    </div>
    <script>
        fetch('./profile.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('name').innerText = data.name || 'Anonymous';
                document.getElementById('title').innerText = data.title || 'Developer';
                document.getElementById('bio').innerText = data.bio || '';
                document.getElementById('github').href = 'https://github.com/' + data.githubUsername;
            })
            .catch(err => console.error("Error loading profile:", err));
    </script>
</body>
</html>
